body: >-
  ## Psychoterapia dzieci i młodzieży


  #### Terapia dzieci i młodzieży w zakresie:


  * zachowań impulsywnych, agresywnych, autoagresywnych 

  * wycofania, izolacji, fobii szkolnej  

  * natręctw, tików. 

  * zaburzeń emocjonalnych 

  * zaburzeń zachowania

  * depresji

  * zaburzeń ze spektrum autyzmu


  #### Konsultacje i diagnoza psychologiczna


  * Proces diagnozowania trwa ok. 3 konsultacji, ale ze względu na różnorodność trudności i zaburzeń może się wydłużyć.


  ## Terapia rodzinna


  <!--StartFragment-->


  <!--StartFragment-->


  Terapia rodzinna jest formą psychoterapii, która polega na założeniu, że rodzina tworzy system, w którym każdy z członków rodziny wzajemnie na siebie oddziałuje. Trudności jednej osoby wpływają na funkcjonowanie całego systemu. Wzajemne powiązania w systemie rodzinnym działają na zasadzie sprzężenia zwrotnego, co oznacza, że zmiana w jednej części systemu pociąga za sobą zmianę w innych jego częściach. W wyniku tego rozpatrywanie problemów jednego członka rodziny bez poznania funkcjonowania całego systemu, w niektórych przypadkach okazuje się niewystarczające.


  Terapia rodzinna to cykl spotkań z rodziną lub w podzespołach rodzinnych, które prowadzi dwóch psychoterapeutów (2 razy w miesiącu)


  Celem terapii rodzinnej najczęściej jest poprawa relacji panujących w rodzinie, wzmocnienie wzajemnego zrozumienia i szacunku członków rodziny, przejście przez naturalne kryzysy rozwojowe w rodzinie, poradzenie sobie z trudnymi doświadczeniami i traumami.


  **U﻿mów spotkanie:**


  t﻿el. 506 963 634


  m﻿ail : pracownia.drabina@gmail.com


  K﻿raków - Nowa Huta


  <!--StartFragment-->


  ### ❓ W jakim wieku dziecko może rozpocząć psychoterapię?


  Psychoterapia dzieci jest dostosowana do wieku i etapu rozwoju dziecka. Z pomocy mogą korzystać zarówno młodsze dzieci, jak i nastolatki. Formę pracy terapeuta dobiera indywidualnie.


  - - -


  ### ❓ Czy rodzice uczestniczą w psychoterapii dziecka?


  Tak. Praca terapeutyczna z dzieckiem zawsze uwzględnia współpracę z rodzicami lub opiekunami. Obejmuje ona konsultacje oraz omówienie postępów terapii.


  - - -


  ### ❓ Jak wygląda pierwsza wizyta w psychoterapii dzieci?


  Pierwsze spotkanie ma charakter konsultacyjny i zazwyczaj odbywa się z rodzicami. Terapeuta poznaje trudności, z którymi zgłasza się dziecko, i proponuje dalszy sposób pracy.


  - - -


  ### ❓ Skąd mam wiedzieć, czy moje dziecko potrzebuje psychoterapii?


  Warto rozważyć konsultację, jeśli u dziecka utrzymują się trudności emocjonalne, zmiany zachowania, problemy w relacjach lub szkole, a także gdy rodzic czuje niepokój o jego samopoczucie.


  - - -


  ### ❓ Jak długo trwa psychoterapia dziecka?


  Czas trwania terapii jest indywidualny i zależy od zgłaszanych trudności oraz potrzeb dziecka. Jest omawiany na początku współpracy i może się zmieniać w trakcie procesu.


  - - -


  ### ❓ Czy psychoterapia dzieci jest bezpieczna?


  Tak. Psychoterapia prowadzona jest zgodnie z zasadami etyki zawodowej, w bezpiecznej i wspierającej atmosferze, z poszanowaniem granic dziecka i rodziny.


  <!--EndFragment-->


  <!--StartFragment-->


  ### ❓ Czym jest terapia rodzinna?


  Terapia rodzinna to forma pomocy, w której terapeuta pracuje z całą rodziną lub jej częścią, aby poprawić komunikację, zrozumieć trudności i wspólnie szukać rozwiązań.


  - - -


  ### ❓ Kiedy warto zgłosić się na terapię rodzinną?


  Terapia rodzinna jest pomocna m.in. w sytuacjach kryzysowych, konfliktach rodzinnych, trudnościach wychowawczych, problemach dziecka lub nastolatka oraz w okresach dużych zmian w życiu rodziny.


  - - -


  ### ❓ Czy na terapię rodzinną muszą przychodzić wszyscy członkowie rodziny?


  Nie zawsze. Skład osób uczestniczących w terapii ustalany jest indywidualnie i zależy od zgłaszanej trudności oraz etapu pracy terapeutycznej.


  - - -


  ### ❓ Jak wygląda pierwsze spotkanie w terapii rodzinnej?


  Pierwsze spotkanie ma charakter konsultacyjny. Terapeuta poznaje perspektywy członków rodziny i pomaga określić cele oraz sposób dalszej pracy.


  - - -


  ### ❓ Ile trwa terapia rodzinna?


  Czas trwania terapii rodzinnej zależy od charakteru trudności i celów terapii. Może obejmować kilka spotkań lub dłuższy proces.


  - - -


  ### ❓ Czy terapia rodzinna oznacza, że „coś jest nie tak” z rodziną?


  Nie. Zgłoszenie się na terapię rodzinną jest formą szukania wsparcia i troski o relacje, a nie oceną czyjąkolwiek winą.


  <!--EndFragment-->
