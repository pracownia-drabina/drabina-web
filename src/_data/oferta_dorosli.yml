body: >-
  ### Psychoterapia dorosłych


  #### Psychoterapia osób dorosłych w zakresie szeroko rozumianego cierpienia psychicznego i emocjonalnego, tj.:


  * depresja

  * nerwice

  * zaburzenia lękowe

  * problemy somatyczne (m.in. chroniczne bóle głowy, kręgosłupa, problemy jelitowe i żołądkowe, drżenie rąk i nóg, omdlenia)

  * trudności w relacjach

  * żałoba

  * sytuacje kryzysowe


  ## Psychoterapia par


  #### C﻿elem terapii par jest między innymi:


  <!--StartFragment-->


  * pomoc w konstruktywnym rozwiązaniu konfliktów i w rozpoznawaniu oraz wyrażaniu potrzeb oraz uczuć,

  * poprawa wzajemnej komunikacji,

  * zwiększenie świadomości oczekiwań własnych oraz małżonka/partnera,

  * wzmacnianie relacji małżeńskiej/partnerskiej,

  * wzmacnianie odpowiedzialności własnej za funkcjonowanie w związku,

  * i inne.


  <!--EndFragment-->


  **U﻿mów spotkanie:**


  t﻿el. 506 963 634


  m﻿ail : pracownia.drabina@gmail.com


  K﻿raków - Nowa Huta


  <!--StartFragment-->


  ### ❓ Jak wygląda pierwsza wizyta u psychoterapeuty?


  Pierwsze spotkanie ma charakter konsultacyjny. Terapeuta poznaje trudności pacjenta i wspólnie omawiane są cele oraz możliwy sposób pracy.


  ### ❓ Czy potrzebne jest skierowanie na psychoterapię?


  Nie, psychoterapia w naszym ośrodku nie wymaga skierowania.


  ### ❓ Ile trwa psychoterapia?


  Czas trwania terapii jest indywidualny i zależy od zgłaszanych trudności oraz celów terapii.


  ### ❓ Czy terapia par jest tylko dla par w kryzysie?


  Nie. Terapia par może pomóc również w poprawie komunikacji i pogłębianiu relacji.


  <!--EndFragment-->
